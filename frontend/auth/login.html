<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESP C++ 学习计划系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #7f8c8d;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #2980b9, #1f618d);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        
        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        
        .demo-info {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .demo-info strong {
            color: #3498db;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>GESP C++ 学习计划</h1>
            <p>请登录系统</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            账号或密码错误，请重试
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="login-btn">登录</button>
        </form>
        
        <div class="register-link">
            <p style="text-align: center; margin-top: 15px;">
                还没有账号？<a href="#" id="registerLink" style="color: #3498db; text-decoration: none;">立即注册</a>
            </p>
        </div>
        
        <!-- 注册表单 -->
        <div id="registerForm" style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <h3 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">用户注册</h3>
            <div class="form-group">
                <label for="registerUsername">用户名</label>
                <input type="text" id="registerUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label for="registerEmail">邮箱</label>
                <input type="email" id="registerEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="registerRole">用户类型</label>
                <select id="registerRole" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
                    <option value="student">学生</option>
                    <option value="teacher">教师</option>
                </select>
            </div>
            <button type="button" id="registerBtn" class="login-btn">注册</button>
            <p style="text-align: center; margin-top: 15px;">
                已有账号？<a href="#" id="loginLink" style="color: #3498db; text-decoration: none;">返回登录</a>
            </p>
        </div>
    </div>
    
    <script>
        // 显示错误信息
        function gesp_showErrorMessage(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }
        
        // 切换到注册表单
        function gesp_switchToRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.querySelector('.register-link').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        // 切换到登录表单
        function gesp_switchToLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.querySelector('.register-link').style.display = 'block';
        }
        
        // 处理登录
        async function gesp_handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                // 调用后端登录API
                const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // 存储token到会话存储
                    sessionStorage.setItem('access_token', data.access_token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    // 登录成功，跳转到首页
                    window.location.href = '../index.html';
                } else {
                    const errorData = await response.json();
                    // 登录失败，显示错误信息
                    gesp_showErrorMessage(errorData.error || '登录失败，请重试');
                }
            } catch (error) {
                console.error('登录请求失败:', error);
                gesp_showErrorMessage('网络错误，请稍后重试');
            }
        }
        
        // 处理注册
        async function gesp_handleRegister() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const email = document.getElementById('registerEmail').value;
            const role = document.getElementById('registerRole').value;
            
            if (!username || !password) {
                gesp_showErrorMessage('用户名和密码不能为空');
                return;
            }
            
            try {
                // 调用后端注册API
                const response = await fetch('http://127.0.0.1:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, email, role })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // 注册成功，自动登录
                    sessionStorage.setItem('access_token', data.access_token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '../index.html';
                } else {
                    const errorData = await response.json();
                    // 注册失败，显示错误信息
                    gesp_showErrorMessage(errorData.error || '注册失败，请重试');
                }
            } catch (error) {
                console.error('注册请求失败:', error);
                gesp_showErrorMessage('网络错误，请稍后重试');
            }
        }
        
        // 绑定事件监听器
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            gesp_switchToRegister();
        });
        
        document.getElementById('loginLink').addEventListener('click', function(e) {
            e.preventDefault();
            gesp_switchToLogin();
        });
        
        document.getElementById('loginForm').addEventListener('submit', gesp_handleLogin);
        
        document.getElementById('registerBtn').addEventListener('click', gesp_handleRegister);
    </script>
</body>
</html>
