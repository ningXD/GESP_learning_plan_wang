<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞赛特攻队 - 竞赛考试必胜系统 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            color: #2c3e50;
            font-size: 1.6rem;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .register-header p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        
        .role-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }
        
        .role-card {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .role-card:hover {
            border-color: #3498db;
            background: #f0f7ff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        
        .role-card.active {
            border-color: #3498db;
            background: #e3f2fd;
        }
        
        .role-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .role-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .role-description {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .next-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }
        
        .next-btn:hover {
            background: linear-gradient(135deg, #2980b9, #1f618d);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .register-container {
                padding: 30px;
            }
            
            .register-header h1 {
                font-size: 1.5rem;
            }
            
            .role-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>竞赛特攻队 - 竞赛考试必胜系统</h1>
            <p>请选择您的用户类型</p>
        </div>
        
        <div class="role-selection">
            <div class="role-card" data-role="student">
                <div class="role-icon">🎓</div>
                <div class="role-title">学生</div>
                <div class="role-description">我是一名学生，想要学习编程和参加竞赛</div>
            </div>
            
            <div class="role-card" data-role="teacher">
                <div class="role-icon">👨‍🏫</div>
                <div class="role-title">教师</div>
                <div class="role-description">我是一名教师，想要管理学生和课程</div>
            </div>
        </div>
        
        <button class="next-btn" id="nextBtn">下一步</button>
        
        <div class="back-link">
            <a href="login.html">已有账号？返回登录</a>
        </div>
    </div>
    
    <script>
        let selectedRole = null;
        
        // 角色选择逻辑
        document.querySelectorAll('.role-card').forEach(card => {
            card.addEventListener('click', function() {
                // 移除所有卡片的active类
                document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
                // 为当前点击的卡片添加active类
                this.classList.add('active');
                // 存储选中的角色
                selectedRole = this.dataset.role;
            });
        });
        
        // 下一步按钮点击事件
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (selectedRole) {
                // 根据选择的角色跳转到对应的注册页面
                window.location.href = `register_${selectedRole}.html`;
            } else {
                // 提示用户选择角色
                alert('请选择您的用户类型');
            }
        });
    </script>
</body>
</html>
